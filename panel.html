
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lingo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="interface">
      <header class="topBar">
        <h1 class="title">Lingo</h1>
        <button id="translateBtn" class="btnPrimary" type="button">Translate</button>
      </header>

      <section class="card">
        <label for="textInput" class="label">Text to translate</label>
        <textarea id="textInput" placeholder="Type or paste text..." rows="4"></textarea>
      </section>

      <section class="card">
        <label for="translationInput" class="label">Translation</label>
        <textarea
          id="translationInput"
          placeholder="Translation appears here"
          rows="4"
          disabled
        ></textarea>

        <div class="bottomControls">
          <span id="statusText" class="statusText" aria-live="polite"></span>
          <select id="targetLanguageSelect" aria-label="Translation language"></select>
        </div>
      </section>
    </main>

    <script src="backend.js"></script>
  </body>
</html>
